---
layout: default
---

<article class="post">
  <a class="back-link" href="{{ '/' | relative_url }}">Back to posts</a>
  <header>
    <p class="eyebrow">Post</p>
    <h1>{{ page.Title | default: page.title }}</h1>
  </header>
  <div class="post-body">
    {{ page.Body | default: content | markdownify }}
  </div>
</article>
